name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build all Fabric mod variants
        run: ./gradlew build -q
        working-directory: client-mod
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Collect mod JARs
        run: |
          mkdir -p release-artifacts
          for dir in client-mod/version-*/build/libs; do
            cp "$dir"/mct-client-mod-fabric-*.jar release-artifacts/ 2>/dev/null || true
          done
          ls -la release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: release-artifacts/*.jar

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:cli

  publish-github-release:
    needs: [build-mod, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mod-jars
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.jar
          generate_release_notes: true

  publish-npm:
    needs: [build-mod, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: npm publish --workspace cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
