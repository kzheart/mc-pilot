name: MctFixture
main: com.mct.fixture.MctFixturePlugin
version: 0.1.0
api-version: '1.20'
commands:
  mcttp:
    description: Teleport the player to a known test position.
    usage: /mcttp
  mctfixture:
    description: Manage the Minecraft Auto Test fixture arena.
    usage: /mctfixture <reset|hud|resourcepack|opensign|drops>
